<uiView>
  <div id="climblogger">

    <!-- Result status (hero) -->
    <div style="top:4%;left:0%;width:100%;height:18%;position:absolute;">
      <div class="f-num" style="top:calc(55% - 50%e); left:calc(50% - 50%e); font-size: 28px;">
        <eval input="/Zapp/{zapp_index}/Output/lastResult" outputFormat="script x => x ? 'SENT!' : 'FAILED'" default="--" />
      </div>
    </div>

    <!-- Grade + Duration of completed route -->
    <div style="top:22%;left:0%;width:50%;height:14%;position:absolute;">
      <div class="cm-mid" style="top:calc(25% - 50%e); left:calc(50% - 50%e); font-size: 10px;">GRADE</div>
      <div class="f-num" style="top:calc(70% - 50%e); left:calc(50% - 50%e); font-size: 24px;">
        <eval input="/Zapp/{zapp_index}/Output/lastGrade" outputFormat="Count_Threedigits" default="--" />
      </div>
    </div>

    <div style="top:22%;left:50%;width:50%;height:14%;position:absolute;">
      <div class="cm-mid" style="top:calc(25% - 50%e); left:calc(50% - 50%e); font-size: 10px;">TIME</div>
      <div class="f-num" style="top:calc(70% - 50%e); left:calc(50% - 50%e); font-size: 20px;">
        <eval input="/Zapp/{zapp_index}/Output/lastDuration" outputFormat="Duration_FourdigitsFixed" default="0:00" />
      </div>
    </div>

    <!-- Avg HR during route -->
    <div style="top:38%;left:0%;width:100%;height:10%;position:absolute;">
      <div class="cm-mid" style="top:calc(50% - 50%e); left:calc(40% - 50%e); font-size: 10px;">AVG HR</div>
      <div class="f-num" style="top:calc(50% - 50%e); left:calc(62% - 50%e); font-size: 22px;">
        <eval input="/Zapp/{zapp_index}/Output/routeHrAvg" outputFormat="HeartRate_Fourdigits" default="--" />
      </div>
    </div>

    <!-- Separator -->
    <div class="cm-mid p-hc" style="top:50%;width:70%;height:1px;opacity:0.4"></div>

    <!-- Session totals -->
    <div style="top:52%;left:0%;width:50%;height:10%;position:absolute;">
      <div class="cm-mid" style="top:calc(25% - 50%e); left:calc(50% - 50%e); font-size: 10px;">ROUTES</div>
      <div class="f-num" style="top:calc(70% - 50%e); left:calc(50% - 50%e); font-size: 20px;">
        <eval input="/Zapp/{zapp_index}/Output/totalRoutes" outputFormat="Count_Threedigits" default="0" />
      </div>
    </div>

    <div style="top:52%;left:50%;width:50%;height:10%;position:absolute;">
      <div class="cm-mid" style="top:calc(25% - 50%e); left:calc(50% - 50%e); font-size: 10px;">SENDS</div>
      <div class="f-num" style="top:calc(70% - 50%e); left:calc(50% - 50%e); font-size: 20px;">
        <eval input="/Zapp/{zapp_index}/Output/totalSends" outputFormat="Count_Threedigits" default="0" />
      </div>
    </div>

    <!-- NEXT button -->
    <div onTap="$.put('/Zapp/{zapp_index}/Event', 3, null, 'int32');"
      style="top:65%;left:15%;width:70%;height:14%;position:absolute;">
      <div style="top:calc(50% - 50%e); left:calc(50% - 50%e);
                  width:80%;height:70%;position:absolute;
                  background:rgba(255,255,255,0.15);border-radius:8px;">
        <div class="f-num" style="top:calc(50% - 50%e); left:calc(50% - 50%e); font-size: 18px;">
          NEXT
        </div>
      </div>
    </div>

    <!-- Current HR (recovery) -->
    <div style="top:82%;left:0%;width:100%;height:14%;position:absolute;">
      <div class="cm-mid" style="top:calc(30% - 50%e); left:calc(42% - 50%e); font-size: 10px;">HR</div>
      <div class="f-num" style="top:calc(30% - 50%e); left:calc(58% - 50%e); font-size: 22px;">
        <eval input="/Activity/Move/-1/Heartrate/Current" outputFormat="HeartRate_Fourdigits" default="--" />
      </div>
    </div>

    <!-- Button hints -->
    <:if test="{{ IS_NG3 }}">
      <div class="btn btn-btm">
        <img class="cm-bgc icon" src="hint-btn-bottom.png" />
      </div>
    </:if>

    <!-- Physical button: down=NEXT -->
    <:if test="{{ HAS_ON_EVENT }}">
    <userInput>
      <pushButton name="down"
        onClick="$.put('/Zapp/{zapp_index}/Event', 3, null, 'int32');" />
    </userInput>
    </:if>

  </div>
</uiView>
