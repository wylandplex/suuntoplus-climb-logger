<uiView onFlickUp="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');"
        onFlickDown="$.put('/Zapp/{zapp_index}/Event', 2, null, 'int32');">
  <div id="climblogger">

    <!-- Title bar -->
    <div class="cm-fg" style="width:100%;height:16%">
      <div class="f-num" style="top:calc(50% - 50%e); left:calc(50% - 50%e); font-size: 14px;">
        <eval input="/Zapp/{zapp_index}/Output/modeSub" outputFormat="script x => x > 0 ? 'ROUTE ' + x : 'PROJECT ' + Math.abs(x)" default="ROUTE 1" />
      </div>
    </div>

    <!-- Grade display (hero) -->
    <div style="top:calc(30% - 50%e); left:calc(50% - 50%e); font-size: 56px;">
      <eval input="/Zapp/{zapp_index}/Output/grade" outputFormat="script x=>x<0?'--':('3a,3a+,3b,3b+,3c,3c+,4a,4a+,4b,4b+,4c,4c+,5a,5a+,5b,5b+,5c,5c+,6a,6a+,6b,6b+,6c,6c+,7a,7a+,7b,7b+,7c,7c+,8a,8a+,8b,8b+,8c,8c+,9a,9a+,9b,9b+,9c|4,4+,5-,5,5+,6-,6,6+,7-,7,7+,8-,8,8+,9-,9,9+,10-,10,10+,11-,11,11+,12-|5.5,5.6,5.7,5.8,5.9,5.10a,5.10b,5.10c,5.10d,5.11a,5.11b,5.11c,5.11d,5.12a,5.12b,5.12c,5.12d,5.13a,5.13b,5.13c,5.13d,5.14a,5.14b,5.14c,5.14d,5.15a,5.15b,5.15c,5.15d|4a,4b,4c,5a,5b,5c,6a,6b,6c,7a,7b|WI2,WI3,WI3+,WI4,WI4+,WI5,WI5+,WI6,WI6+,WI7,WI7+|M1,M2,M3,M4,M5,M6,M7,M8,M9,M10,M11,M12|VB,V0,V1,V2,V3,V4,V5,V6,V7,V8,V9,V10,V11,V12|4A,4A+,4B,4B+,4C,4C+,5A,5A+,5B,5B+,5C,5C+,6A,6A+,6B,6B+,6C,6C+,7A,7A+,7B,7B+,7C,7C+,8A,8A+,8B,8B+,8C,8C+'.split('|')[Math.floor(x/100)]||'').split(',')[x%100]||'?'" default="--" />
    </div>

    <!-- Grade system label (doubleTap to cycle system) -->
    <div onDoubleTap="$.put('/Zapp/{zapp_index}/Event', 6, null, 'int32');"
      style="top:40%;left:0%;width:100%;height:8%;position:absolute;">
      <div class="cm-mid" style="top:calc(50% - 50%e); left:calc(50% - 50%e); font-size: 13px;">
        <eval input="/Zapp/{zapp_index}/Output/grade" outputFormat="script x=>'FR,UIAA,YDS,UK,WI,MXD,V,FB'.split(',')[Math.floor(x/100)]||'FR'" default="FR" />
      </div>
    </div>

    <!-- START button -->
    <div onTap="$.put('/Zapp/{zapp_index}/Event', 3, null, 'int32');"
      style="top:49%;left:15%;width:70%;height:13%;position:absolute;">
      <div style="top:calc(50% - 50%e); left:calc(50% - 50%e);
                  width:80%;height:65%;position:absolute;
                  background:rgba(255,255,255,0.15);border-radius:8px;">
        <div class="f-num" style="top:calc(50% - 50%e); left:calc(50% - 50%e); font-size: 20px;">START</div>
      </div>
    </div>

    <!-- Separator -->
    <div class="cm-mid p-hc" style="top:64%;width:70%;height:1px;opacity:0.4"></div>

    <!-- Project stats (labels + values hidden in free mode via script) -->
    <div class="cm-mid" style="top:calc(67% - 50%e); left:calc(28% - 50%e); font-size: 9px;">
      <eval input="/Zapp/{zapp_index}/Output/climbMode" outputFormat="script x => x ? 'TRIES' : ''" />
    </div>
    <div class="f-num" style="top:calc(72% - 50%e); left:calc(28% - 50%e); font-size: 16px;">
      <eval input="/Zapp/{zapp_index}/Output/projTries" outputFormat="script x => x >= 0 ? x : ''" />
    </div>

    <div class="cm-mid" style="top:calc(67% - 50%e); left:calc(50% - 50%e); font-size: 9px;">
      <eval input="/Zapp/{zapp_index}/Output/climbMode" outputFormat="script x => x ? 'SENDS' : ''" />
    </div>
    <div class="f-num" style="top:calc(72% - 50%e); left:calc(50% - 50%e); font-size: 16px;">
      <eval input="/Zapp/{zapp_index}/Output/projSends" outputFormat="script x => x >= 0 ? x : ''" />
    </div>

    <div class="cm-mid" style="top:calc(67% - 50%e); left:calc(72% - 50%e); font-size: 9px;">
      <eval input="/Zapp/{zapp_index}/Output/climbMode" outputFormat="script x => x ? 'BEST' : ''" />
    </div>
    <div class="f-num" style="top:calc(72% - 50%e); left:calc(72% - 50%e); font-size: 14px;">
      <eval input="/Zapp/{zapp_index}/Output/projBest" outputFormat="script x => x >= 0 ? (Math.floor(x/60) + ':' + ('0' + (x%60)).slice(-2)) : ''" />
    </div>

    <!-- Session time -->
    <div class="cm-mid p-hc" style="top:calc(79% - 50%e); font-size: 10px;">SESSION</div>
    <div class="f-num p-hc" style="top:calc(84% - 50%e); font-size: 14px;">
      <eval input="/Zapp/{zapp_index}/Output/sessionTime" outputFormat="Duration_FourdigitsFixed" default="0:00" />
    </div>

    <!-- Button hints -->
    <:if test="{{ IS_NG3 }}">
      <div class="btn btn-top">
        <img class="cm-bgc icon" src="hint-btn-top.png" />
      </div>
      <div class="btn btn-btm">
        <img class="cm-bgc icon" src="hint-btn-bottom.png" />
      </div>
    </:if>

    <!-- Physical: up=grade up, up long=cycle mode, down=grade down, down long=START -->
    <:if test="{{ HAS_ON_EVENT }}">
    <userInput>
      <pushButton name="up"
        onClick="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');"
        onLongPressStart="$.put('/Zapp/{zapp_index}/Event', 5, null, 'int32');" />
      <pushButton name="down"
        onClick="$.put('/Zapp/{zapp_index}/Event', 2, null, 'int32');"
        onLongPressStart="$.put('/Zapp/{zapp_index}/Event', 3, null, 'int32');" />
    </userInput>
    </:if>

  </div>
</uiView>
