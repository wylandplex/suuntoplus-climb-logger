<uiView>
  <div id="climblogger">

    <!-- Title bar -->
    <div class="cm-fg" style="width:100%;height:16%">
      <div class="f-num" style="top:calc(50% - 50%e); left:calc(50% - 50%e); font-size: 14px;">
        <eval input="/Zapp/{zapp_index}/Output/modeSub" outputFormat="script x => x > 0 ? 'ROUTE ' + x : 'PROJECT ' + Math.abs(x)" default="ROUTE 1" />
      </div>
    </div>

    <!-- Route timer (hero) -->
    <div class="f-num" style="top:calc(34% - 50%e); left:calc(50% - 50%e); font-size: 52px;">
      <eval input="/Zapp/{zapp_index}/Output/routeTime" outputFormat="Duration_FourdigitsFixed" default="0:00" />
    </div>

    <!-- Separator -->
    <div class="cm-mid p-hc" style="top:48%;width:70%;height:1px;opacity:0.4"></div>

    <!-- HR + Route# side by side -->
    <div class="cm-mid" style="top:calc(52% - 50%e); left:calc(30% - 50%e); font-size: 11px;">HR</div>
    <div class="f-num" style="top:calc(59% - 50%e); left:calc(30% - 50%e); font-size: 24px;">
      <eval input="/Activity/Move/-1/Heartrate/Current" outputFormat="HeartRate_Fourdigits" default="--" />
    </div>

    <!-- Vertical separator -->
    <div class="cm-mid p-hc" style="top:51%;width:1px;height:16%;opacity:0.3"></div>

    <div class="cm-mid" style="top:calc(52% - 50%e); left:calc(70% - 50%e); font-size: 11px;">GRADE</div>
    <div class="f-num" style="top:calc(59% - 50%e); left:calc(70% - 50%e); font-size: 20px;">
      <eval input="/Zapp/{zapp_index}/Output/grade" outputFormat="script x=>x<0?'--':('3a,3a+,3b,3b+,3c,3c+,4a,4a+,4b,4b+,4c,4c+,5a,5a+,5b,5b+,5c,5c+,6a,6a+,6b,6b+,6c,6c+,7a,7a+,7b,7b+,7c,7c+,8a,8a+,8b,8b+,8c,8c+,9a,9a+,9b,9b+,9c|4,4+,5-,5,5+,6-,6,6+,7-,7,7+,8-,8,8+,9-,9,9+,10-,10,10+,11-,11,11+,12-|5.5,5.6,5.7,5.8,5.9,5.10a,5.10b,5.10c,5.10d,5.11a,5.11b,5.11c,5.11d,5.12a,5.12b,5.12c,5.12d,5.13a,5.13b,5.13c,5.13d,5.14a,5.14b,5.14c,5.14d,5.15a,5.15b,5.15c,5.15d|4a,4b,4c,5a,5b,5c,6a,6b,6c,7a,7b|WI2,WI3,WI3+,WI4,WI4+,WI5,WI5+,WI6,WI6+,WI7,WI7+|M1,M2,M3,M4,M5,M6,M7,M8,M9,M10,M11,M12|VB,V0,V1,V2,V3,V4,V5,V6,V7,V8,V9,V10,V11,V12|4A,4A+,4B,4B+,4C,4C+,5A,5A+,5B,5B+,5C,5C+,6A,6A+,6B,6B+,6C,6C+,7A,7A+,7B,7B+,7C,7C+,8A,8A+,8B,8B+,8C,8C+'.split('|')[Math.floor(x/100)]||'').split(',')[x%100]||'?'" default="--" />
    </div>

    <!-- Separator -->
    <div class="cm-mid p-hc" style="top:67%;width:70%;height:1px;opacity:0.4"></div>

    <!-- SEND + FAIL buttons (trigger lap + event) -->
    <div onTap="$.put('/Activity/Trigger', 23); $.put('/Zapp/{zapp_index}/Event', 3, null, 'int32');"
      style="top:70%;left:5%;width:44%;height:14%;position:absolute;">
      <div style="top:calc(50% - 50%e); left:calc(50% - 50%e);
                  width:85%;height:65%;position:absolute;
                  background:rgba(255,255,255,0.15);border-radius:6px;">
        <div class="f-num" style="top:calc(50% - 50%e); left:calc(50% - 50%e); font-size: 18px;">SEND</div>
      </div>
    </div>

    <div onTap="$.put('/Activity/Trigger', 23); $.put('/Zapp/{zapp_index}/Event', 4, null, 'int32');"
      style="top:70%;left:51%;width:44%;height:14%;position:absolute;">
      <div style="top:calc(50% - 50%e); left:calc(50% - 50%e);
                  width:85%;height:65%;position:absolute;
                  background:rgba(255,255,255,0.06);border-radius:6px;">
        <div class="cm-mid" style="top:calc(50% - 50%e); left:calc(50% - 50%e); font-size: 18px;">FAIL</div>
      </div>
    </div>

    <!-- Session time -->
    <div class="cm-mid p-hc" style="top:calc(88% - 50%e); font-size: 10px;">
      SESSION <eval input="/Zapp/{zapp_index}/Output/sessionTime" outputFormat="Duration_FourdigitsFixed" default="0:00" />
    </div>

    <!-- Button hints -->
    <:if test="{{ IS_NG3 }}">
      <div class="btn btn-btm">
        <img class="cm-bgc icon" src="hint-btn-bottom.png" />
      </div>
    </:if>

    <!-- Physical: down=SEND+lap, long down=FAIL+lap -->
    <:if test="{{ HAS_ON_EVENT }}">
    <userInput>
      <pushButton name="down"
        onClick="$.put('/Activity/Trigger', 23); $.put('/Zapp/{zapp_index}/Event', 3, null, 'int32');"
        onLongPressStart="$.put('/Activity/Trigger', 23); $.put('/Zapp/{zapp_index}/Event', 4, null, 'int32');" />
    </userInput>
    </:if>

  </div>
</uiView>
