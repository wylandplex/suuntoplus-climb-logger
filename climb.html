<uiView>
  <div id="climblogger">

    <!-- Grade reference (top) -->
    <div class="cm-fg" style="width:100%;height:12%">
      <div class="f-num" style="top:calc(55% - 50%e); left:calc(50% - 50%e); font-size: 14px;">
        GRADE <eval input="/Zapp/{zapp_index}/Output/grade" outputFormat="Count_Threedigits" default="5" />
      </div>
    </div>

    <!-- Route timer (hero) -->
    <div style="top:12%;left:0%;width:100%;height:30%;position:absolute;">
      <div class="f-num" style="top:calc(55% - 50%e); left:calc(50% - 50%e); font-size: 52px;">
        <eval input="/Zapp/{zapp_index}/Output/routeTime" outputFormat="Duration_FourdigitsFixed" default="0:00" />
      </div>
    </div>

    <!-- Live HR -->
    <div style="top:42%;left:0%;width:100%;height:12%;position:absolute;">
      <div class="cm-mid" style="top:calc(50% - 50%e); left:calc(42% - 50%e); font-size: 10px;">HR</div>
      <div class="f-num" style="top:calc(50% - 50%e); left:calc(58% - 50%e); font-size: 26px;">
        <eval input="/Activity/Move/-1/Heartrate/Current" outputFormat="HeartRate_Fourdigits" default="--" />
      </div>
    </div>

    <!-- SEND + FAIL buttons -->
    <div onTap="$.put('/Zapp/{zapp_index}/Event', 3, null, 'int32');"
      style="top:56%;left:5%;width:44%;height:14%;position:absolute;">
      <div style="top:calc(50% - 50%e); left:calc(50% - 50%e);
                  width:85%;height:70%;position:absolute;
                  background:rgba(255,255,255,0.15);border-radius:6px;">
        <div class="f-num" style="top:calc(50% - 50%e); left:calc(50% - 50%e); font-size: 16px;">SEND</div>
      </div>
    </div>

    <div onTap="$.put('/Zapp/{zapp_index}/Event', 4, null, 'int32');"
      style="top:56%;left:51%;width:44%;height:14%;position:absolute;">
      <div style="top:calc(50% - 50%e); left:calc(50% - 50%e);
                  width:85%;height:70%;position:absolute;
                  background:rgba(255,255,255,0.06);border-radius:6px;">
        <div class="cm-mid" style="top:calc(50% - 50%e); left:calc(50% - 50%e); font-size: 16px;">FAIL</div>
      </div>
    </div>

    <!-- Separator -->
    <div class="cm-mid p-hc" style="top:73%;width:70%;height:1px;opacity:0.4"></div>

    <!-- Bottom: route number + session time -->
    <div class="cm-mid" style="top:calc(78% - 50%e); left:calc(30% - 50%e); font-size: 10px;">ROUTE</div>
    <div class="f-num" style="top:calc(84% - 50%e); left:calc(30% - 50%e); font-size: 16px;">
      <eval input="/Zapp/{zapp_index}/Output/routeNum" outputFormat="Count_Threedigits" default="1" />
    </div>

    <div class="cm-mid" style="top:calc(78% - 50%e); left:calc(70% - 50%e); font-size: 10px;">SESSION</div>
    <div class="f-num" style="top:calc(84% - 50%e); left:calc(70% - 50%e); font-size: 14px;">
      <eval input="/Zapp/{zapp_index}/Output/sessionTime" outputFormat="Duration_FourdigitsFixed" default="0:00" />
    </div>

    <!-- Button hints -->
    <:if test="{{ IS_NG3 }}">
      <div class="btn btn-btm">
        <img class="cm-bgc icon" src="hint-btn-bottom.png" />
      </div>
    </:if>

    <!-- Physical buttons: down=SEND, down long=FAIL -->
    <:if test="{{ HAS_ON_EVENT }}">
    <userInput>
      <pushButton name="down"
        onClick="$.put('/Zapp/{zapp_index}/Event', 3, null, 'int32');"
        onLongPressStart="$.put('/Zapp/{zapp_index}/Event', 4, null, 'int32');" />
    </userInput>
    </:if>

  </div>
</uiView>
